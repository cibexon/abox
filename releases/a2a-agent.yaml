---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-agent
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-agent
  template:
    metadata:
      labels:
        app: a2a-agent
    spec:
      containers:
        - name: a2a-agent
          image: ghcr.io/cibexon/abox/a2a-agent:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /.well-known/agent.json
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: a2a-agent
  namespace: kagent
spec:
  selector:
    app: a2a-agent
  ports:
    - port: 80
      targetPort: 8000
