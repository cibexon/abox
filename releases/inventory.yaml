---
apiVersion: v1
kind: Namespace
metadata:
  name: agentregistry

---
apiVersion: agentregistry.dev/v1alpha1
kind: DiscoveryConfig
metadata:
  name: abox-discovery
  namespace: agentregistry
spec:
  environments:
    - name: abox
      cluster:
        name: local
        namespace: kagent
      namespaces:
        - kagent
      discoveryEnabled: true
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agentregistry-inventory
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/den-vasyliev/agentregistry-inventory
  ref:
    branch: main

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentregistry
  namespace: agentregistry
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: charts/agentregistry
      sourceRef:
        kind: GitRepository
        name: agentregistry-inventory
        namespace: flux-system
  values:
    replicaCount: 1
    disableAuth: true
