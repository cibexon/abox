name: Build and push a2a-agent image

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'apps/a2a-agent/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/a2a-agent
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/a2a-agent:latest
            ghcr.io/${{ github.repository }}/a2a-agent:${{ github.ref_name }}
